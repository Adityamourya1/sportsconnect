version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mysports_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - mysports_network

  backend:
    build:
      context: ./backend
    container_name: mysports_backend
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://root:password@mongodb:27017/mysports?authSource=admin
      SECRET_KEY: your-secret-key-change-this
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
    depends_on:
      - mongodb
    networks:
      - mysports_network
    volumes:
      - ./backend:/app

  frontend:
    image: node:18-alpine
    container_name: mysports_frontend
    ports:
      - "3000:3000"
    working_dir: /app
    command: npm run dev
    depends_on:
      - backend
    networks:
      - mysports_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  mysports_network:
    driver: bridge
